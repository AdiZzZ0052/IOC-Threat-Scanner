name: Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "IOC-Threat-Scanner" --icon=assets/icon.ico ioc_scanner.py
      continue-on-error: true

    - name: Build executable (fallback without icon)
      if: failure()
      run: |
        pyinstaller --onefile --windowed --name "IOC-Threat-Scanner" ioc_scanner.py

    - name: Upload Windows executable
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./dist/IOC-Threat-Scanner.exe
        asset_name: IOC-Threat-Scanner-${{ github.event.release.tag_name }}-Windows.exe
        asset_content_type: application/octet-stream

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/* --skip-existing
      continue-on-error: true
